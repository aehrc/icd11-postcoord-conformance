# Build the docs/ Jekyll site and deploy it to GitHub Pages.
#
# The aehrc org Actions allowlist blocks Marketplace actions including the
# official Pages chain (actions/configure-pages, actions/deploy-pages) and
# ruby/setup-ruby. This workflow avoids all of them — it only uses
# actions/checkout (first-party) and runs everything else as shell steps.
# Pages output is force-pushed to the `gh-pages` branch with a .nojekyll
# marker so the legacy Pages build serves the pre-built static HTML
# verbatim, bypassing the broken legacy Jekyll build path entirely.

name: pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need credentials configured to push the build output back to the
          # gh-pages branch. The GITHUB_TOKEN automatically provisioned by
          # Actions has `contents: write` from the permissions block above.
          persist-credentials: true

      - name: Install Jekyll
        run: |
          ruby --version
          gem install --user-install bundler jekyll
          echo "$(ruby -r rubygems -e 'puts Gem.user_dir')/bin" >> "$GITHUB_PATH"
          cat > Gemfile <<'EOF'
          source "https://rubygems.org"
          gem "jekyll", "~> 4.3"
          gem "minima", "~> 2.5"
          EOF
          bundle config path vendor/bundle
          bundle install

      - name: Build site
        run: |
          bundle exec jekyll build \
            --source docs \
            --destination _site \
            --baseurl "/icd11-postcoord-conformance"
        env:
          JEKYLL_ENV: production

      - name: Deploy to gh-pages branch
        run: |
          # .nojekyll tells legacy Pages to serve the files as-is without
          # running its own Jekyll pass — we've already built the site.
          touch _site/.nojekyll

          cd _site
          git init -q -b gh-pages
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -q -m "Pages build from ${GITHUB_SHA::7}"
          git push -qf \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
