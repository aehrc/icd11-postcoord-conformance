# Nightly conformance run against the WHO ICD-API FHIR endpoint.
#
# Triggers weekly (Mon 04:00 UTC) and on-demand. Runs the Newman suite, renders
# a per-case HTML report, and commits the result back to `main` for GitHub Pages
# to serve under /icd11-postcoord-conformance/results/.
#
# The commit is tagged `[skip ci]` to avoid retrigger loops — without this, the
# push step would trip any CI configured on `push` events.
#
# This workflow only runs the ICD-API side (the reference baseline). Comparing
# a specific candidate server against the suite is a per-organisation choice
# and lives outside this repo (anyone can `./run.sh --candidate <url> --icdapi
# <url>` locally and inspect the diff).

name: nightly-conformance

on:
  schedule:
    # Mon 04:00 UTC. Arbitrary slot — adjust if it clashes with anything.
    - cron: '0 4 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # WHO's public FHIR-testing endpoint for the ICD-API. Replace if WHO
      # moves the canonical URL or publishes a stable alias.
      ICDAPI_BASE: https://icdapi-fhir-testing-byfzd6budwdmbabf.northeurope-01.azurewebsites.net/fhir
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install newman + jq
        run: |
          npm install -g newman
          sudo apt-get update -qq
          sudo apt-get install -y jq

      - name: Wait for ICD-API endpoint
        run: |
          for i in $(seq 1 30); do
            if curl -sf "$ICDAPI_BASE/metadata" >/dev/null; then
              echo "ICD-API reachable after ${i}s"
              exit 0
            fi
            sleep 4
          done
          echo "ICD-API endpoint $ICDAPI_BASE not reachable" >&2
          exit 1

      - name: Run conformance suite
        # ICD-API side only; no candidate server in CI. Anyone wanting a
        # head-to-head against their own server runs ./run.sh locally with
        # --candidate <their-url>.
        run: ./run.sh --icdapi "$ICDAPI_BASE"

      - name: Render HTML report
        run: |
          STAMP=$(date -u +%F)
          python3 tools/render-report.py \
            comparison.json \
            "docs/results/icd-api-${STAMP}.html" \
            docs/results/latest.html

      - name: Commit + push results
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STAMP=$(date -u +%F)
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add docs/results/
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "Nightly conformance run ${STAMP} [skip ci]"
          git push
